services:
  db:
    image: postgres:16-alpine
    container_name: gp_visits_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: gp_visits
    ports:
      - "5432:5432"
    volumes:
      - gp_visits_data:/var/lib/postgresql/data

volumes:
  gp_visits_data:
